name: Streamic Auto Build

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      rewrite_only:
        description: "Run RSS rewrite + build only (skip deep-dive generation)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      summaries_only:
        description: "Run Groq summary generation + build only"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write

env:
  SITE_BASE_URL: "https://www.thestreamic.in"

jobs:
  build:
    name: Fetch + Rewrite + Summarise + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser feedparser[chardet] beautifulsoup4 python-slugify jinja2 requests

      # ── Step 1: Fetch fresh RSS metadata ──────────────────────────────────
      - name: Fetch RSS metadata
        if: >
          github.event.inputs.rewrite_only != 'true' &&
          github.event.inputs.summaries_only != 'true'
        run: python scripts/fetch_rss.py

      # ── Step 2: Generate deterministic original articles ─────────────────
      - name: Generate original articles (deterministic, no LLM)
        if: >
          github.event.inputs.rewrite_only != 'true' &&
          github.event.inputs.summaries_only != 'true'
        run: python scripts/generate_originals.py

      # ── Step 3: Rewrite RSS → 300-word cards + full article pages ─────────
      - name: Rewrite RSS → originals
        if: github.event.inputs.summaries_only != 'true'
        run: python scripts/rewrite_feed.py

      # ── Step 4: Groq summary generation (unique per article) ──────────────
      # Writes to data/summaries/<slug>.json — build.py reads these automatically.
      # Runs every build if GROQ_API_KEY is set; silently skips if not.
      - name: Generate editorial deep-dive articles
        if: github.event.inputs.summaries_only != 'true'
        run: python scripts/generate_editorial.py

      - name: Generate unique article summaries via Groq
        if: vars.GROQ_API_KEY != ''
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python scripts/generate_summaries.py || echo "Groq step failed — continuing with cached summaries"

      # ── Step 5: Build site ────────────────────────────────────────────────
      - name: Build site
        run: python scripts/build.py

      # ── Step 6: Verify output ─────────────────────────────────────────────
      - name: Verify build output
        run: |
          test -f docs/index.html     || (echo "ERROR: docs/index.html missing"  && exit 1)
          test -f docs/streaming.html || (echo "ERROR: streaming.html missing"   && exit 1)
          test -f docs/sitemap.xml    || (echo "ERROR: sitemap.xml missing"      && exit 1)
          echo "Article pages : $(find docs/articles -name '*.html' 2>/dev/null | wc -l)"
          echo "Category pages: $(find docs -maxdepth 1 -name '*.html' | wc -l)"
          echo "Groq summaries: $(find data/summaries -name '*.json' 2>/dev/null | wc -l)"

      # ── Step 7: Commit everything ─────────────────────────────────────────
      - name: Commit site
        run: |
          git config user.name  "Streamic Bot"
          git config user.email "technodate3@gmail.com"
          git add docs/ data/*.json data/summaries/ || true
          git add *.html *.xml *.txt style.css main.js CNAME .nojekyll 2>/dev/null || true
          git add articles/ assets/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "build: auto-refresh [skip ci]"
            git pull --rebase origin main || true
            git push origin main
          fi
