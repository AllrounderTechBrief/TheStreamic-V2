name: Streamic Auto Build

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      rewrite_only:
        description: "Run RSS rewrite + build only (skip deep-dive generation)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write

env:
  SITE_BASE_URL: "https://www.thestreamic.in"

jobs:
  build:
    name: Fetch + Rewrite + Build Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser beautifulsoup4 python-slugify jinja2 requests

      - name: Fetch RSS metadata (skip on rewrite_only)
        if: github.event.inputs.rewrite_only != 'true'
        run: python scripts/fetch_rss.py

      - name: Generate original articles — deterministic templates
        if: github.event.inputs.rewrite_only != 'true'
        run: python scripts/generate_originals.py

      - name: Rewrite RSS → 300-word cards + full article pages
        run: python scripts/rewrite_feed.py

      - name: Build site (category pages + articles + sitemap)
        run: python scripts/build.py

      - name: Verify build output
        run: |
          test -f docs/index.html     || (echo "ERROR: docs/index.html missing"  && exit 1)
          test -f docs/streaming.html || (echo "ERROR: streaming.html missing"   && exit 1)
          test -f docs/sitemap.xml    || (echo "ERROR: sitemap.xml missing"      && exit 1)
          echo "Article pages : $(find docs/articles -name '*.html' 2>/dev/null | wc -l)"
          echo "Category pages: $(find docs -maxdepth 1 -name '*.html' | wc -l)"

      - name: Commit site
        run: |
          git config user.name  "Streamic Bot"
          git config user.email "technodate3@gmail.com"
          git add docs/ data/*.json || true
          git add *.html *.xml *.txt style.css main.js CNAME .nojekyll 2>/dev/null || true
          git add articles/ assets/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "build: auto-refresh [skip ci]"
            git pull --rebase origin main || true
            git push origin main
          fi
